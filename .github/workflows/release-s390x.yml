# Hardened QEMU s390x release workflow for the image-build CONSUMER family (components built FROM the
# dnse-tech hardened base, e.g. dns-node-cache, containerd, flannel). Builds the s390x leg under QEMU
# on a self-hosted x64 runner (labels: self-hosted, Linux, X64, os:ubuntu-24.04), then combines it
# with the upstream amd64/arm64 legs (pinned BY DIGEST) into one
# published manifest. workflow_dispatch-only.
#
# Differs from the base template: the dispatch `tag` is the COMPONENT image version (e.g.
# 1.26.8-build20260608), not a Go version. The build job passes the component source tag (the tag with
# any -buildYYYYMMDD suffix stripped) as the `TAG` build-arg, and builds from the DEFAULT branch whose
# Dockerfile is already s390x-aware (no per-version build branch, no Dockerfile patch).
#
# IMAGE_NAME / UPSTREAM_IMAGE are rendered per-fork by apply-s390x-patch.sh.
#
# Hardening: C3 dynamic upstream legs · H2 digest-pinned upstream pulls · M4 immutable combined tag
# (force=true to overwrite) · M5 workflow_dispatch-only · no GitHub Release job.
name: Release s390x

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Component release tag (e.g., 1.26.8-build20260608)"
        required: true
        type: string
      force:
        description: "Overwrite the combined tag if it already exists (treat as immutable otherwise)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hardened-crictl   # rendered per-fork by apply-s390x-patch.sh
  UPSTREAM_IMAGE: rancher/hardened-crictl                              # rendered per-fork by apply-s390x-patch.sh

jobs:
  build-s390x:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      source_tag: ${{ steps.get-tag.outputs.source_tag }}
    steps:
      # Build from the default branch (s390x-aware Dockerfile). The component version comes from the
      # TAG build-arg, not the checkout, so the s390x leg matches the upstream amd64/arm64 legs.
      - name: Checkout (default branch — s390x-aware Dockerfile)
        uses: actions/checkout@v4

      - name: Resolve component + source tag
        id: get-tag
        env:
          TAG: ${{ inputs.tag }}        # via env, never inlined into the shell (injection-safe)
        run: |
          set -euo pipefail
          # strip the -buildYYYYMMDD suffix to get the upstream component source tag
          SOURCE_TAG="$(printf '%s' "$TAG" | sed -E 's/-build[0-9]+$//')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG, source: $SOURCE_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push s390x image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/s390x
          push: true
          # Dockerfile build target — rendered per-fork. Empty = final stage (single-image forks);
          # set for multi-image forks (e.g. multus thin/thick) so each pseudo-project builds its stage.
          target: 
          build-args: |
            TAG=${{ steps.get-tag.outputs.source_tag }}
          # Read-only token for fetching s390x build deps from PRIVATE sibling forks (e.g.
          # dnse-tech/k3s-root release assets). Consumed via `RUN --mount=type=secret,id=ghtoken`
          # in the Dockerfile; never baked into an image layer. Empty/unused for consumers with no
          # private-fork dep. Provision K3S_ROOT_RO_TOKEN as an Actions secret (org or repo).
          secrets: |
            ghtoken=${{ secrets.K3S_ROOT_RO_TOKEN }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get-tag.outputs.tag }}-s390x

  create-manifest:
    runs-on: ubuntu-latest
    needs: build-s390x
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: M4 — refuse to clobber an existing combined tag unless force
        env:
          TAG: ${{ needs.build-s390x.outputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG"
          if docker buildx imagetools inspect "$IMG" >/dev/null 2>&1; then
            if [ "$FORCE" != "true" ]; then
              echo "::error::$IMG already exists and force=false (tags are immutable). Re-run with force=true to overwrite."
              exit 1
            fi
            echo "::warning::$IMG exists; force=true → overwriting."
          fi

      # H2/C3/M2: combine the s390x leg with the upstream legs referenced DIRECTLY by digest. No
      # pull/retag/push roundtrip — imagetools copies the digest-pinned upstream manifests into the
      # target repo, so published per-arch digests match what the verifier recorded at preflight.
      - name: Create and push multi-arch manifest (digest-pinned legs)
        env:
          TAG: ${{ needs.build-s390x.outputs.tag }}
          UP: ${{ env.UPSTREAM_IMAGE }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          RAW="$(docker buildx imagetools inspect --raw "$UP:$TAG")"
          mapfile -t LEGS < <(echo "$RAW" | jq -r --arg up "$UP" '.manifests[]
            | select(.platform.os=="linux" and .platform.architecture!="unknown")
            | "\($up)@\(.digest)"')
          if [ "${#LEGS[@]}" -eq 0 ]; then
            echo "::error::no real linux upstream legs detected for $UP:$TAG — refusing to publish s390x-only"
            exit 1
          fi
          echo "upstream legs:"; printf '  %s\n' "${LEGS[@]}"
          docker buildx imagetools create -t "$IMG:$TAG" "$IMG:$TAG-s390x" "${LEGS[@]}"
          echo "Created: $IMG:$TAG"

      - name: Verify manifest
        env:
          TAG: ${{ needs.build-s390x.outputs.tag }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools inspect "$IMG:$TAG"
          docker buildx imagetools inspect --raw "$IMG:$TAG" \
            | jq -e '[.manifests[].platform.architecture] | index("s390x") != null' >/dev/null \
            || { echo "::error::s390x leg missing from combined manifest"; exit 1; }
