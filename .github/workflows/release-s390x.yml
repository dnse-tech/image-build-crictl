name: Release s390x

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.31.0-build20260126)"
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hardened-crictl
  UPSTREAM_IMAGE: rancher/hardened-crictl

jobs:
  build-s390x:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      crictl_tag: ${{ steps.get-tag.outputs.crictl_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get tag
        id: get-tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          # Strip -buildYYYYMMDD for source checkout
          CRICTL_TAG=$(echo "$TAG" | sed 's/-build[0-9]*$//')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "crictl_tag=$CRICTL_TAG" >> $GITHUB_OUTPUT
          echo "Full tag: $TAG"
          echo "Crictl tag: $CRICTL_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push s390x
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/s390x
          push: true
          build-args: |
            TAG=${{ steps.get-tag.outputs.crictl_tag }}
            ARCH=s390x
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get-tag.outputs.tag }}-s390x

  create-manifest:
    needs: build-s390x
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag upstream images
        run: |
          TAG="${{ needs.build-s390x.outputs.tag }}"
          echo "Processing tag: $TAG"

          for ARCH in amd64 arm64; do
            echo "Pulling ${{ env.UPSTREAM_IMAGE }}:$TAG for $ARCH..."
            docker pull --platform linux/$ARCH ${{ env.UPSTREAM_IMAGE }}:$TAG
            docker tag ${{ env.UPSTREAM_IMAGE }}:$TAG ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-$ARCH
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-$ARCH
            echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-$ARCH"
          done

      - name: Create multi-arch manifest
        run: |
          TAG="${{ needs.build-s390x.outputs.tag }}"
          echo "Creating manifest for $TAG..."

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG-s390x

          echo "Multi-arch manifest created: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG"
